# Web Server Configuration
# Last updated: 2026-02-15
# Author: sysadmin

server_name=oldserver.example.com
listen_port=80
document_root=/var/www/html
error_log=/var/log/nginx/error.log
access_log=/var/log/nginx/access.log

# SSL Settings
ssl_enabled=false
ssl_certificate=/etc/ssl/certs/oldserver.pem
ssl_key=/etc/ssl/private/oldserver.key

# Performance
worker_processes=4
max_connections=1024
keepalive_timeout=65

# Database
db_host=oldserver.example.com
db_port=5432
db_name=production
db_user=webapp
db_password=changeme123

# Email notifications
admin_email=admin@oldserver.example.com
alert_email=alerts@oldserver.example.com

# Application
app_name=MyWebApp
app_version=2.1.0
app_environment=production
debug_mode=false
log_level=INFO
